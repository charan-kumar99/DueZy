name: duezy
description: "Duezy — EMI/Bill Reminder App. Never miss a payment again."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_messaging: ^16.4.0
  firebase_auth: ^6.5.4

  # Local Notifications
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0

  # Permissions
  permission_handler: ^12.0.3

  # UI & Utilities
  intl: ^0.20.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
